apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: shopsense
  labels:
    app: shopsense
    service: gateway
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopsense
      service: gateway
  template:
    metadata:
      labels:
        app: shopsense
        service: gateway
        version: v1
    spec:
      containers:
        - name: gateway
          image: shopsense/gateway:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: shopsense-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: shopsense
  labels:
    app: shopsense
    service: gateway
    version: v1
spec:
  type: LoadBalancer
  selector:
    app: shopsense
    service: gateway
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
