apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation
  namespace: shopsense
  labels:
    app: shopsense
    service: recommendation
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopsense
      service: recommendation
  template:
    metadata:
      labels:
        app: shopsense
        service: recommendation
        version: v1
    spec:
      containers:
        - name: recommendation
          image: shopsense/recommendation:latest
          ports:
            - containerPort: 8002
          envFrom:
            - configMapRef:
                name: shopsense-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: recommendation
  namespace: shopsense
  labels:
    app: shopsense
    service: recommendation
    version: v1
spec:
  type: ClusterIP
  selector:
    app: shopsense
    service: recommendation
  ports:
    - port: 8002
      targetPort: 8002
      protocol: TCP
