apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
  namespace: shopsense
  labels:
    app: shopsense
    service: catalog
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopsense
      service: catalog
  template:
    metadata:
      labels:
        app: shopsense
        service: catalog
        version: v1
    spec:
      containers:
        - name: catalog
          image: shopsense/catalog:latest
          ports:
            - containerPort: 8001
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: catalog
  namespace: shopsense
  labels:
    app: shopsense
    service: catalog
    version: v1
spec:
  type: ClusterIP
  selector:
    app: shopsense
    service: catalog
  ports:
    - port: 8001
      targetPort: 8001
      protocol: TCP
