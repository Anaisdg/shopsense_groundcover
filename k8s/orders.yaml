apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: shopsense
  labels:
    app: shopsense
    service: orders
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shopsense
      service: orders
  template:
    metadata:
      labels:
        app: shopsense
        service: orders
        version: v1
    spec:
      containers:
        - name: orders
          image: shopsense/orders:latest
          ports:
            - containerPort: 8003
          envFrom:
            - configMapRef:
                name: shopsense-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: shopsense
  labels:
    app: shopsense
    service: orders
    version: v1
spec:
  type: ClusterIP
  selector:
    app: shopsense
    service: orders
  ports:
    - port: 8003
      targetPort: 8003
      protocol: TCP
