version: "3.8"

services:
  gateway:
    build: ./services/gateway
    ports:
      - "8000:8000"
    environment:
      - CATALOG_URL=http://catalog:8001
      - RECOMMENDATION_URL=http://recommendation:8002
      - ORDERS_URL=http://orders:8003
    depends_on:
      - catalog
      - recommendation
      - orders

  catalog:
    build: ./services/catalog
    ports:
      - "8001:8001"

  recommendation:
    build: ./services/recommendation
    ports:
      - "8002:8002"
    environment:
      - CATALOG_URL=http://catalog:8001

  orders:
    build: ./services/orders
    ports:
      - "8003:8003"
    environment:
      - CATALOG_URL=http://catalog:8001
